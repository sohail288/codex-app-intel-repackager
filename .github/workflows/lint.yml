name: Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python linters
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff
        run: ruff check scripts/check_upstream.py scripts/inspect_upstream_bundle.py

      - name: Mypy
        run: mypy --python-version 3.10 --strict scripts/check_upstream.py scripts/inspect_upstream_bundle.py

      - name: Inspect Upstream Bundle Fixture
        run: |
          set -euo pipefail
          FIXTURE_ROOT="$(mktemp -d)"
          APP="$FIXTURE_ROOT/Codex.app"
          APP_SRC="$FIXTURE_ROOT/app-src"
          mkdir -p \
            "$APP/Contents/Frameworks/Electron Framework.framework/Resources" \
            "$APP/Contents/Resources/app.asar.unpacked/node_modules/node-pty/bin/darwin-arm64-143" \
            "$APP_SRC/node_modules/better-sqlite3" \
            "$APP_SRC/node_modules/node-pty"
          python3 - "$APP" <<'PY'
import plistlib
import pathlib
import sys

app = pathlib.Path(sys.argv[1])

with (app / "Contents" / "Info.plist").open("wb") as handle:
    plistlib.dump(
        {
            "CFBundleShortVersionString": "260206.1448",
            "CFBundleVersion": "565",
        },
        handle,
    )

with (app / "Contents" / "Frameworks" / "Electron Framework.framework" / "Resources" / "Info.plist").open("wb") as handle:
    plistlib.dump(
        {
            "CFBundleVersion": "40.0.0",
        },
        handle,
    )
PY
          python3 - "$APP_SRC" <<'PY'
import json
import pathlib
import sys

root = pathlib.Path(sys.argv[1])
(root / "package.json").write_text(json.dumps({"name": "openai-codex-electron", "version": "26.0.0"}) + "\n", encoding="utf-8")
(root / "node_modules" / "better-sqlite3" / "package.json").write_text(json.dumps({"name": "better-sqlite3", "version": "12.5.0"}) + "\n", encoding="utf-8")
(root / "node_modules" / "node-pty" / "package.json").write_text(json.dumps({"name": "node-pty", "version": "1.1.0"}) + "\n", encoding="utf-8")
PY
          npm_config_cache="$(mktemp -d)" npm_config_loglevel=error npm_config_update_notifier=false \
            npx --yes @electron/asar pack "$APP_SRC" "$APP/Contents/Resources/app.asar"
          python3 scripts/inspect_upstream_bundle.py "$APP" > bundle-metadata.json
          python3 - <<'PY'
import json

data = json.load(open("bundle-metadata.json", "r", encoding="utf-8"))
mods = {item["name"]: item["version"] for item in data["native_modules"]}

assert data["electron_version"] == "40.0.0", data
assert data["node_pty_abi_suffix"] == "143", data
assert mods["better-sqlite3"] == "12.5.0", data
assert mods["node-pty"] == "1.1.0", data
PY

      - name: ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck scripts/repackage-intel.sh
